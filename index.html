<script>

const API='https://genie-code.vercel.app/api/genie'

let busy=false

/* conversation memory */
let chatHistory=[
{
role:"system",
content:`You are Genie Code, an AI Data Engineering agent similar to Databricks Genie.
Help users design pipelines, generate SQL queries, explore tables and plan medallion architecture.
Always think step by step and provide structured responses.`
}
]

function esc(s){
return String(s||'')
.replace(/&/g,'&amp;')
.replace(/</g,'&lt;')
.replace(/>/g,'&gt;')
}

function sqlHL(c){
return esc(c)
.replace(/\b(SELECT|FROM|WHERE|GROUP BY|ORDER BY|LIMIT|JOIN|ON|AS|WITH|AND|OR|COUNT|SUM|AVG)\b/gi,'<span class="kw">$1</span>')
.replace(/'([^']*)'/g,'<span class="st">\'$1\'</span>')
}

function addMsg(html){

const g=document.getElementById('g-msgs')

const d=document.createElement('div')
d.className='msg'
d.innerHTML=html

g.appendChild(d)

g.scrollTop=g.scrollHeight

return d
}

function delay(ms){
return new Promise(r=>setTimeout(r,ms))
}

function switchToChat(){

document.getElementById('g-welcome').style.display='none'

const c=document.getElementById('g-chat')

c.style.display='flex'
c.style.flexDirection='column'

document.getElementById("g-ta").focus()
}

function quickPrompt(t){

document.getElementById('g-ta').value=t
go()

}

function insertAt(){

const ta=document.getElementById('g-ta')

ta.value+='@'
ta.focus()

}

function startWithAI(){

switchToChat()

}

function showPipeline(name){

document.getElementById('welcome').style.display='none'

const pe=document.getElementById('pipeline-editor')

pe.style.display='flex'
pe.style.flex='1'

document.getElementById('pipe-name-lbl').textContent=name
document.getElementById('ps-name').textContent=name

document.getElementById('breadcrumb').textContent=name

document.getElementById('dry-run-btn').style.display='block'
document.getElementById('run-btn').style.display='block'

}

/* MAIN AI FUNCTION */

async function go(){

if(busy)return

const ta=document.getElementById('g-ta')

const prompt=ta.value.trim()

if(!prompt)return

ta.value=''

busy=true

document.getElementById('send-btn').classList.remove('ready')

switchToChat()

addMsg(`<div class="msg-user">${esc(prompt)}</div>`)

/* save message */

chatHistory.push({
role:"user",
content:prompt
})

/* thinking animation */

const thinking = addMsg(`
<div class="msg-thinking">
<span class="dots">Genie is analysing your request</span>
</div>
`)

try{

const res = await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
messages:chatHistory
})
})

const data = await res.json()

thinking.remove()

/* store assistant response */

chatHistory.push({
role:"assistant",
content:JSON.stringify(data)
})

/* PIPELINE DETECTION */

if(prompt.toLowerCase().includes("pipeline")){

let pname='new_pipeline'

const nm=prompt.match(/name\s+["']?(\w+)["']?/i)

if(nm)pname=nm[1]

addMsg(`
<div class="msg-action">
Creating pipeline <strong>${pname}</strong>
</div>
`)

await delay(600)

addMsg(`
<div class="msg-status">
Pipeline created successfully
</div>
`)

showPipeline(pname)

}

/* SQL detection */

if(data.sql){

addMsg(`
<div class="msg-sql">
<div class="sql-hdr">
<span class="sql-lbl">SQL</span>
</div>
<pre class="sql-body">${sqlHL(data.sql)}</pre>
</div>
`)

}

/* Agent plan */

if(data.agentPlan){

const items=data.agentPlan.map(p=>
`<div class="ap-item">
<div class="ap-dot ap-done">✓</div>
<span>${esc(p.title)}</span>
</div>`
).join("")

addMsg(`
<div class="msg-ap">
<div class="ap-hdr">
<div class="ap-hdr-txt">Agent Plan</div>
</div>
${items}
</div>
`)

}

/* assistant answer */

addMsg(`
<div class="msg-numbered">
${esc(data.answer || data.summary || "Task completed")}
</div>
`)

}catch(e){

thinking.innerHTML=`
<div class="msg-action" style="color:red">
Error: ${esc(e.message)}
</div>
`

}

busy=false

document.getElementById('send-btn').classList.add('ready')

document.getElementById('g-msgs').scrollTop=99999

}

/* textarea behaviour */

const ta=document.getElementById('g-ta')

ta.addEventListener('input',function(){

this.style.height='auto'

this.style.height=Math.min(this.scrollHeight,100)+'px'

document.getElementById('send-btn')
.classList.toggle('ready',this.value.trim().length>0)

})

ta.addEventListener('keydown',e=>{

if(e.key==='Enter'&&!e.shiftKey){

e.preventDefault()

go()

}

})

</script>
